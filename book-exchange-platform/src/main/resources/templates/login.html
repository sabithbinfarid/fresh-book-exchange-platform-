<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Exchange Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }
        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        .login-header p {
            margin: 0;
            opacity: 0.95;
            font-size: 15px;
            font-weight: 500;
        }
        .login-body {
            padding: 50px 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .register-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }
        .register-link p {
            margin: 0 0 10px 0;
            color: #666;
            font-size: 14px;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .register-link a:hover {
            color: #764ba2;
        }
        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 8px;
            padding: 10px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .demo-roles {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            background: #f4f7ff;
            border: 1px solid #d8e2ff;
            font-size: 13px;
            color: #3b4b79;
        }
        .demo-roles strong {
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h1>📚 Book Exchange</h1>
                <p>Connect with Book Lovers</p>
            </div>
            <div class="login-body">
                <form th:action="@{/login}" method="post" onsubmit="return validateForm()">
                    <div class="form-group">
                        <label for="username">Email Address</label>
                        <input type="email" id="username" name="username" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-login">Sign In</button>
                </form>
                <div th:if="${param.error}" class="error-message show">
                    Invalid email or password. Please try again.
                </div>
                <div class="demo-roles">
                    <strong>Role-based login accounts</strong>
                    ADMIN: admin@bookexchange.com / Admin@123<br>
                    USER: user@bookexchange.com / User@123
                </div>
                <div class="register-link">
                    <p>Don't have an account?</p>
                    <a th:href="@{/register}">Create one now →</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function validateForm() {
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
