<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Community Library Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app-theme.css}" rel="stylesheet">
</head>
<body class="page-auth-login">
    <div class="auth-shell">
        <div class="auth-card">
            <header class="auth-header">
                <div class="badge-pill">Account Access</div>
                <h1 class="mt-3 mb-2">Community Library</h1>
                <p class="muted mb-0">Sign in to your marketplace dashboard.</p>
            </header>
            <div class="auth-body">
                <form th:action="@{/login}" method="post" onsubmit="return validateForm()">
                    <div class="form-group">
                        <label for="username">Email Address</label>
                        <input type="email" id="username" name="username" class="input-ui" placeholder="Enter your email" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="input-ui" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-ui primary block mt-2">Sign In</button>
                </form>

                <div th:if="${param.error}" class="alert-ui danger mt-3" role="alert" aria-live="polite">Invalid email or password. Please try again.</div>

                <div class="text-center mt-4">
                    <p class="muted mb-1">Do not have an account?</p>
                    <a th:href="@{/register}" class="btn-ui secondary">Create one now</a>
                </div>

                <div class="text-center mt-3">
                    <button id="themeToggle" type="button" class="btn-ui secondary theme-toggle">Theme: Auto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
    <script>
        function validateForm() {
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            return !!(email && password);
        }

        AppUI.init({ themeToggleId: 'themeToggle' });
    </script>
</body>
</html>
