<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Community Library Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app-theme.css}" rel="stylesheet">
</head>
<body class="page-auth-register">
    <div class="auth-shell">
        <div class="auth-card">
            <header class="auth-header">
                <div class="badge-pill">Create Account</div>
                <h1 class="mt-3 mb-2">Join Community Library</h1>
                <p class="muted mb-0">Start with a standard USER account and begin borrowing books.</p>
            </header>
            <div class="auth-body">
                <form th:action="@{/register}" method="post" th:object="${user}" onsubmit="return validateForm()">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="input-ui" placeholder="John Doe" autocomplete="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" th:field="*{email}" class="input-ui" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" th:field="*{password}" class="input-ui" placeholder="At least 6 characters" autocomplete="new-password" required>
                        <p class="muted mt-1 mb-0">Use a combination of letters, numbers, and symbols.</p>
                    </div>
                    <div class="form-group">
                        <input type="hidden" th:field="*{roleName}" value="USER">
                        <p class="muted mb-0">All new registrations are created as USER accounts.</p>
                    </div>
                    <button type="submit" class="btn-ui primary block mt-2">Create Account</button>
                </form>

                <div class="text-center mt-4">
                    <p class="muted mb-1">Already have an account?</p>
                    <a th:href="@{/login}" class="btn-ui secondary">Sign in here</a>
                </div>

                <div class="text-center mt-3">
                    <button id="themeToggle" type="button" class="btn-ui secondary theme-toggle">Theme: Auto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
    <script>
        function validateForm() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!fullName) {
                alert('Please enter your full name');
                return false;
            }
            if (!email) {
                alert('Please enter your email');
                return false;
            }
            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return false;
            }
            return true;
        }

        AppUI.init({ themeToggleId: 'themeToggle' });
    </script>
</body>
</html>
