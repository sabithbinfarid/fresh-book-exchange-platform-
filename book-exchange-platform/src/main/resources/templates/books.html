<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Book Exchange Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --dark-bg: #0f0f0f;
            --dark-card: #1a1a1a;
            --dark-text: #f0f0f0;
            --light-text: #b0b0b0;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            color: white !important;
        }
        .nav-link {
            margin: 0 10px;
            font-weight: 500;
            transition: all 0.3s;
            color: rgba(255,255,255,0.9) !important;
        }
        .nav-link:hover {
            color: #ffc107 !important;
        }
        .role-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin: 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-badge.admin {
            background: rgba(34, 197, 94, 0.3);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.5);
        }
        .role-badge.user {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }
        .navbar-toggler {
            border-color: rgba(255,255,255,0.5);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 20px;
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
            flex-wrap: wrap;
            gap: 20px;
        }
        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
        }
        .btn-add-book {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-add-book:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .book-card {
            background-color: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            transition: all 0.3s;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        .book-card:hover {
            transform: translateY(-8px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
        }
        .book-card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .book-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .book-author {
            color: var(--light-text);
            font-size: 14px;
            margin-bottom: 15px;
        }
        .book-price {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .book-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            width: fit-content;
        }
        .status-available {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }
        .status-sold {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .book-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn-action {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-order {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-edit {
            background: #3b82f6;
            color: white;
        }
        .btn-edit:hover {
            background: #2563eb;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .no-books {
            text-align: center;
            padding: 80px 20px;
            color: var(--light-text);
        }
        .no-books-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .no-books h4 {
            font-size: 24px;
            margin-bottom: 10px;
            color: white;
        }
        .modal-content {
            background-color: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px 12px 0 0;
        }
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
        .modal-title {
            font-weight: 700;
        }
        .form-label {
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            background-color: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            transition: all 0.3s;
        }
        .form-control::placeholder {
            color: var(--light-text);
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255,255,255,0.15);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            color: white;
        }
        .form-select option {
            background-color: var(--dark-bg);
            color: white;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .container {
            max-width: 1200px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">📚 Book Exchange</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/borrow-page">📚 Borrowed</a>
                    </li>
                    <li class="nav-item" th:if="${isAdmin}">
                        <a class="nav-link" href="/admin/users-page">👥 Users</a>
                    </li>
                    <li class="nav-item">
                        <span id="currentRoleBadge" class="role-badge user">USER</span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link" style="color: rgba(255,255,255,0.9);">🚪 Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div>
            <h1>📖 Available Books</h1>
        </div>
        <div th:if="${isAdmin}">
            <button class="btn-add-book" data-bs-toggle="modal" data-bs-target="#addBookModal">
                ➕ Add New Book
            </button>
        </div>
    </div>

    <div class="container pb-5">
        <div th:if="${books.isEmpty()}" class="no-books">
            <div class="no-books-icon">📚</div>
            <h4>No Books Available</h4>
            <p>There are currently no books in the platform.</p>
        </div>

        <div th:unless="${books.isEmpty()}" class="row g-4">
            <div th:each="book : ${books}" class="col-md-6 col-lg-4">
                <div class="book-card">
                    <div class="book-card-body">
                        <h5 class="book-title" th:text="${book.title}"></h5>
                        <p class="book-author">✍️ by <span th:text="${book.author}"></span></p>
                        <div class="book-price">Rs. <span th:text="${book.price}"></span></div>
                        <span th:id="'status-' + ${book.id}"
                            th:class="'book-status ' + (${book.status.name() == 'AVAILABLE'} ? 'status-available' : 'status-sold')"
                              th:text="${book.status}">
                        </span>
                        
                        <!-- Admin CRUD buttons -->
                        <div class="book-actions" th:if="${isAdmin}">
                            <button class="btn-action btn-edit" 
                                    data-bs-toggle="modal" 
                                    data-bs-target="#editBookModal"
                                    th:onclick="editBook([[${book.id}]], [[${book.title}]], [[${book.author}]], [[${book.price}]], '[[${book.status}]]')">
                                ✏️ Edit
                            </button>
                            <button class="btn-action btn-delete" 
                                    th:onclick="deleteBook([[${book.id}]])">
                                🗑️ Delete
                            </button>
                        </div>

                        <!-- Non-admin users can borrow available books -->
                        <div class="book-actions" th:if="${!isAdmin}">
                            <button class="btn-action btn-order"
                                    th:if="${#lists.contains(borrowedBookIds, book.id)}"
                                    disabled>
                                ✅ Ordered
                            </button>
                            <button class="btn-action btn-order"
                                    th:if="${!#lists.contains(borrowedBookIds, book.id) and book.status.name() == 'AVAILABLE'}"
                                    th:onclick="borrowNow(this, [[${book.id}]])">
                                📚 Borrow Now
                            </button>
                            <button class="btn-action btn-order"
                                    th:if="${!#lists.contains(borrowedBookIds, book.id) and book.status.name() != 'AVAILABLE'}"
                                    disabled>
                                ⛔ Unavailable
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Book Modal (Admin Only) -->
    <div class="modal fade" id="addBookModal" tabindex="-1" th:if="${isAdmin}">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📚 Add New Book</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addBookForm">
                        <div class="mb-3">
                            <label for="title" class="form-label">Book Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter book title" required>
                        </div>
                        <div class="mb-3">
                            <label for="author" class="form-label">Author Name</label>
                            <input type="text" class="form-control" id="author" placeholder="Enter author name" required>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (Rs)</label>
                            <input type="number" class="form-control" id="price" placeholder="0.00" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" required>
                                <option value="AVAILABLE">✓ Available</option>
                                <option value="SOLD">✗ Sold</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-submit" onclick="submitAddBook()">Add Book</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Book Modal (Admin Only) -->
    <div class="modal fade" id="editBookModal" tabindex="-1" th:if="${isAdmin}">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📝 Edit Book</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editBookForm">
                        <input type="hidden" id="editBookId">
                        <div class="mb-3">
                            <label for="editTitle" class="form-label">Book Title</label>
                            <input type="text" class="form-control" id="editTitle" required>
                        </div>
                        <div class="mb-3">
                            <label for="editAuthor" class="form-label">Author Name</label>
                            <input type="text" class="form-control" id="editAuthor" required>
                        </div>
                        <div class="mb-3">
                            <label for="editPrice" class="form-label">Price (Rs)</label>
                            <input type="number" class="form-control" id="editPrice" step="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="editStatus" class="form-label">Status</label>
                            <select class="form-select" id="editStatus" required>
                                <option value="AVAILABLE">✓ Available</option>
                                <option value="SOLD">✗ Sold</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-submit" onclick="submitEditBook()">Update Book</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BOOKS = '/api/books';
        const API_BORROWS = '/api/borrows';
        let currentUserId = null;

        // Keep navbar role badge consistent using the authenticated API profile.
        function loadRoleBadge() {
            fetch('/api/auth/me')
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(data => {
                    currentUserId = data.userId;
                    const badge = document.getElementById('currentRoleBadge');
                    if (!badge) return;
                    badge.textContent = data.isAdmin ? 'ADMIN' : 'USER';
                    badge.classList.remove('admin', 'user');
                    badge.classList.add(data.isAdmin ? 'admin' : 'user');
                })
                .catch(() => {
                    // Keep default badge if the profile endpoint is temporarily unavailable.
                });
        }

        loadRoleBadge();

        // Add Book
        function submitAddBook() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const price = document.getElementById('price').value;
            const status = document.getElementById('status').value;

            const bookData = {
                title,
                author,
                price: parseFloat(price),
                status
            };

            fetch(API_BOOKS, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookData)
            })
            .then(r => {
                if (r.ok) {
                    alert('✅ Book added successfully!');
                    location.reload();
                } else {
                    alert('❌ Failed to add book');
                }
            })
            .catch(e => alert('Error: ' + e.message));
        }

        // Edit Book
        function editBook(id, title, author, price, status) {
            document.getElementById('editBookId').value = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editAuthor').value = author;
            document.getElementById('editPrice').value = price;
            document.getElementById('editStatus').value = status;
        }

        function submitEditBook() {
            const id = document.getElementById('editBookId').value;
            const title = document.getElementById('editTitle').value;
            const author = document.getElementById('editAuthor').value;
            const price = document.getElementById('editPrice').value;
            const status = document.getElementById('editStatus').value;

            const bookData = {
                title,
                author,
                price: parseFloat(price),
                status
            };

            fetch(`${API_BOOKS}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookData)
            })
            .then(r => {
                if (r.ok) {
                    alert('✅ Book updated successfully!');
                    location.reload();
                } else {
                    alert('❌ Failed to update book');
                }
            })
            .catch(e => alert('Error: ' + e.message));
        }

        // Delete Book
        function deleteBook(id) {
            if (confirm('🗑️ Are you sure you want to delete this book?')) {
                fetch(`${API_BOOKS}/${id}`, { method: 'DELETE' })
                .then(r => {
                    if (r.ok) {
                        alert('✅ Book deleted successfully!');
                        location.reload();
                    } else {
                        alert('❌ Failed to delete book');
                    }
                })
                .catch(e => alert('Error: ' + e.message));
            }
        }

        // Borrow Book (for normal users)
        function borrowNow(buttonEl, bookId) {
            if (!currentUserId) {
                alert('❌ Could not identify your account. Please refresh and try again.');
                return;
            }

            buttonEl.disabled = true;
            buttonEl.textContent = '⏳ Ordering...';

            fetch(API_BORROWS, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bookId: bookId
                })
            })
            .then(async r => {
                if (r.ok) {
                    buttonEl.textContent = '✅ Ordered';

                    const statusBadge = document.getElementById(`status-${bookId}`);
                    if (statusBadge) {
                        statusBadge.textContent = 'RESERVED';
                        statusBadge.classList.remove('status-available');
                        statusBadge.classList.add('status-sold');
                    }

                    setTimeout(() => {
                        window.location.href = '/borrow-page';
                    }, 600);
                    return;
                }

                let message = '❌ Failed to borrow book';
                try {
                    const err = await r.json();
                    if (err && err.message) {
                        message = `❌ ${err.message}`;
                    }
                } catch (_) {
                    // Ignore parsing errors and use default message.
                }
                buttonEl.disabled = false;
                buttonEl.textContent = '🛒 Order Now';
                alert(message);
            })
            .catch(e => {
                buttonEl.disabled = false;
                buttonEl.textContent = '🛒 Order Now';
                alert('Error: ' + e.message);
            });
        }

    </script>
</body>
</html>
