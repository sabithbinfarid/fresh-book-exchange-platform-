<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Book Exchange Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --dark-bg: #0f0f0f;
            --dark-card: #1a1a1a;
            --dark-text: #f0f0f0;
            --light-text: #b0b0b0;
        }
        body {
            background-color: var(--dark-bg);
            color: var(--dark-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            color: white !important;
        }
        .nav-link {
            margin: 0 10px;
            font-weight: 500;
            transition: all 0.3s;
            color: rgba(255,255,255,0.9) !important;
        }
        .nav-link:hover {
            color: #ffc107 !important;
        }
        .role-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin: 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-badge.admin {
            background: rgba(34, 197, 94, 0.3);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.5);
        }
        .role-badge.user {
            background: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }
        .navbar-toggler {
            border-color: rgba(255,255,255,0.5);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.8%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 50px 20px;
            margin-bottom: 50px;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }
        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
        }
        .table-container {
            background-color: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .table {
            margin: 0;
        }
        .table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .table thead th {
            border: none;
            font-weight: 700;
            padding: 18px 15px;
        }
        .table tbody td {
            padding: 18px 15px;
            vertical-align: middle;
            border-color: rgba(255,255,255,0.1);
            color: var(--dark-text);
        }
        .table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .table tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.1);
        }
        .table tbody tr:last-child {
            border-bottom: none;
        }
        .role-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }
        .role-admin {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        .role-user {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }
        .role-seller {
            background: rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
        }
        .role-buyer {
            background: rgba(249, 115, 22, 0.2);
            color: #fed7aa;
        }
        .no-users {
            text-align: center;
            padding: 80px 20px;
            color: var(--light-text);
        }
        .no-users-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .no-users h4 {
            font-size: 24px;
            margin-bottom: 10px;
            color: white;
        }
        .container {
            max-width: 1200px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">📚 Book Exchange</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">🏠 Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/books-page">📖 Books</a>
                    </li>
                    <li class="nav-item">
                        <span id="currentRoleBadge" class="role-badge admin">ADMIN</span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link" style="color: rgba(255,255,255,0.9);">🚪 Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <h1>👥 Platform Users (Admin Only)</h1>
        </div>
    </div>

    <div class="container pb-5">
        <div th:if="${users.isEmpty()}" class="no-users">
            <div class="no-users-icon">👥</div>
            <h4>No Users Found</h4>
            <p>There are currently no users in the platform.</p>
        </div>

        <div th:unless="${users.isEmpty()}" class="table-container">
            <div style="overflow-x: auto;">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Full Name</th>
                            <th>Roles</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td><strong th:text="${user.id}"></strong></td>
                            <td><span th:text="${user.email}"></span></td>
                            <td><span th:text="${user.fullName}"></span></td>
                            <td>
                                <span th:each="role : ${user.roles}" 
                                      th:class="'role-badge role-' + ${role.name?.toLowerCase()}"
                                      th:text="${role.name}">
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadRoleBadge() {
            fetch('/api/auth/me')
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(data => {
                    const badge = document.getElementById('currentRoleBadge');
                    if (!badge) return;
                    badge.textContent = data.isAdmin ? 'ADMIN' : 'USER';
                    badge.classList.remove('admin', 'user');
                    badge.classList.add(data.isAdmin ? 'admin' : 'user');
                })
                .catch(() => {
                    // Keep default badge if profile endpoint is unavailable.
                });
        }

        loadRoleBadge();
    </script>
</body>
</html>
