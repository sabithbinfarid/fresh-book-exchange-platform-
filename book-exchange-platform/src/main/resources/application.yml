spring:
  application:
    name: book-exchange-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/book_exchange_db}
    username: ${SPRING_DATASOURCE_USERNAME:book_exchange_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_securely}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
server:
  port: ${PORT:8080}
logging:
  level:
    org.springframework.security: INFO
